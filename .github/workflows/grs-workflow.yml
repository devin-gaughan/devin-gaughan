name: Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 3 AM UTC (10 AM ICT)
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=devin-gaughan&show_icons=true&hide_border=true&include_all_commits=true&count_private=true&theme=tokyonight"
          path: profile/stats.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=devin-gaughan&layout=compact&hide_border=true&theme=tokyonight&langs_count=8"
          path: profile/top-langs.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update GitHub stats cards"
          git push
